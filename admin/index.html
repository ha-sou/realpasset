<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 대시보드 - REAL.P</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="admin.css">
    <style>
        :root {
            --primary-color: #2563eb;
            --bg-color: #f3f4f6;
            --card-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            min-height: 100vh;
        }
        .sidebar {
            width: 250px;
            background: #1f2937;
            color: white;
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
        }
        .sidebar .logo {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 3rem;
            color: white;
        }
        .sidebar .logo span { color: var(--primary-color); }
        .nav-item {
            padding: 0.75rem 1rem;
            border-radius: 8px;
            margin-bottom: 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .nav-item.active { background: var(--primary-color); }
        .nav-item:hover:not(.active) { background: #374151; }
        
        .main-content {
            flex: 1;
            padding: 2rem 3rem;
            overflow-y: auto;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }
        header h1 { font-size: 1.875rem; margin: 0; }
        .user-info { display: flex; align-items: center; gap: 1rem; }
        .logout-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.5rem;
            margin-bottom: 3rem;
        }
        .stat-card {
            background: white;
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: var(--card-shadow);
        }
        .stat-card h3 { color: #6b7280; font-size: 0.875rem; margin: 0 0 0.5rem 0; }
        .stat-card .value { font-size: 1.5rem; font-weight: 700; }

        .table-container {
            background: white;
            border-radius: 12px;
            box-shadow: var(--card-shadow);
            overflow: hidden;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th {
            background: #f9fafb;
            text-align: left;
            padding: 1rem 1.5rem;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            color: #6b7280;
            border-bottom: 1px solid #e5e7eb;
        }
        td {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid #e5e7eb;
            font-size: 0.875rem;
        }
        tr:hover { background: #f9fafb; }
        
        .status-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .status-pending { background: #fef3c7; color: #92400e; }
        .status-contacted { background: #dcfce7; color: #166534; }
        .status-completed { background: #dbeafe; color: #1e40af; }
        .status-cancelled { background: #f3f4f6; color: #374151; }

        .action-btn {
            background: none;
            border: 1px solid #d1d5db;
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .action-btn:hover { background: #f3f4f6; }

        .download-btn {
            background: #059669;
            color: white;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.875rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }
        .download-btn:hover { background: #047857; transform: translateY(-1px); }
        .download-btn svg {
            width: 16px;
            height: 16px;
        }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="logo">REAL.<span>P</span></div>
        <div class="nav-container">
            <div class="nav-item active">문의 관리</div>
            <div class="nav-item">통계 분석</div>
            <div class="nav-item">설정</div>
        </div>
    </aside>
    <main class="main-content">
        <header>
            <h1>문의 내역 관리</h1>
            <div class="user-info">
                <button class="download-btn" id="downloadCsvBtn">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    엑셀 다운로드
                </button>
                <span id="adminName">Loading...</span>
                <button class="logout-btn" id="logoutBtn">로그아웃</button>
            </div>
        </header>

        <section class="stats-grid">
            <div class="stat-card">
                <h3>전체 문의</h3>
                <div class="value" id="totalCount">0</div>
            </div>
            <div class="stat-card">
                <h3>대기 중</h3>
                <div class="value" id="pendingCount">0</div>
            </div>
            <div class="stat-card">
                <h3>연락 완료</h3>
                <div class="value" id="contactedCount">0</div>
            </div>
            <div class="stat-card">
                <h3>완료 사례</h3>
                <div class="value" id="completedCount">0</div>
            </div>
        </section>

        <section class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>유형</th>
                        <th>성함</th>
                        <th>연락처</th>
                        <th>관심지역/예산</th>
                        <th>상담내용</th>
                        <th>신청일시</th>
                        <th>상태</th>
                        <th>관리</th>
                    </tr>
                </thead>
                <tbody id="inquiryTable">
                    <!-- Data will be loaded here -->
                </tbody>
            </table>
        </section>
    </main>

    <script src="admin.js"></script>
</body>
</html>
