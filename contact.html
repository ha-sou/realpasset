<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>상담 예약 - REAL.P</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo"><a href="index.html" style="text-decoration: none; color: inherit;">REAL.<span>P</span></a></div>
        <div class="nav-links" id="nav-links">
            <a href="about.html">회사소개</a>
            <a href="services.html">자산 플래닝</a>
            <a href="investment.html">투자정보</a>
            <a href="contact.html" class="active">상담 예약</a>
        </div>
        <div class="nav-actions">
            <button class="btn-primary small" onclick="window.location.href='https://open.kakao.com/'">
                <img src="assets/kakaotalk.svg" alt="카카오톡" class="btn-icon">
                카톡문의
            </button>
            <div class="menu-toggle" id="mobile-menu">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <main class="subpage-section">
        <div class="subpage-header fade-in-up">
            <div class="badge">Contact Us</div>
            <h1>투자의 막연한 불안을<br><span class="gradient-text">명확한 확신으로</span></h1>
            <p>전문가와 함께하는 대면 상담을 지금 바로 신청하세요.</p>
        </div>

        <div class="content-container fade-in-up delay-2">
            <form id="contactForm" class="contact-form glass-card">
                <div class="form-group">
                    <label for="name">성명</label>
                    <input type="text" id="name" name="name" placeholder="이름을 입력해주세요" required>
                </div>
                <div class="form-group">
                    <label for="phone">연락처</label>
                    <input type="tel" id="phone" name="phone" placeholder="010-0000-0000" required>
                </div>
                <div class="form-group">
                    <label for="sector">관심 지역/분야</label>
                    <select id="sector" name="sector" required>
                        <option value="">분야를 선택해주세요</option>
                        <option value="명동/도심권 소액 투자">명동/도심권 소액 투자</option>
                        <option value="용산 글로벌 중심지 투자">용산 글로벌 중심지 투자</option>
                        <option value="마포 미래 가치 거점 투자">마포 미래 가치 거점 투자</option>
                        <option value="기타 자산 포트폴리오 상담">기타 자산 포트폴리오 상담</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="message">상담 내용</label>
                    <textarea id="message" name="message" rows="4" placeholder="궁금하신 점이나 현재 고민이신 부분을 자유롭게 남겨주세요." required></textarea>
                </div>
                <button type="submit" class="btn-primary" style="width: 100%; margin-top: 1rem;">대면 상담 예약하기</button>
            </form>
        </div>
    </main>
    <script>
        const mobileMenu = document.getElementById('mobile-menu');
        const navLinks = document.getElementById('nav-links');

        mobileMenu.addEventListener('click', () => {
            mobileMenu.classList.toggle('active');
            navLinks.classList.toggle('active');
        });

        // 폼 제출 처리
        document.getElementById('contactForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const submitBtn = e.target.querySelector('button[type="submit"]');
            const originalText = submitBtn.textContent;
            submitBtn.disabled = true;
            submitBtn.textContent = '제출 중...';

            const formData = new FormData(e.target);
            const data = {
                type: 'GENERAL',
                name: formData.get('name'),
                phone: formData.get('phone'),
                sector: formData.get('sector'),
                message: formData.get('message')
            };

            try {
                const response = await fetch('/.netlify/functions/submit-inquiry', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    alert('상담 예약이 완료되었습니다. 담당자가 곧 연락드리겠습니다.');
                    window.location.href = 'index.html';
                } else {
                    const error = await response.json();
                    throw new Error(error.error || '제출에 실패했습니다.');
                }
            } catch (err) {
                console.error('Error:', err);
                alert('오류가 발생했습니다: ' + err.message);
                submitBtn.disabled = false;
                submitBtn.textContent = originalText;
            }
        });
    </script>
</body>
</html>
